project:
  type: default

bibliography: references.bib
# Make sure pandoc can resolve figure paths from any include source.
resource-path:
  - .
  - sections
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/nature.csl

format:
  html:
    include-before-body:
      - _version-banner.html
    toc: true
    toc-depth: 3
    number-sections: true
    theme: cosmo
    embed-resources: true
  plos-pdf:
    # Single-column PDF for bioRxiv submission. The PLOS template provides
    # structured author rendering (numbered affiliations, * marker for
    # corresponding authors, numbered citation style). The PLOS extension's
    # pdf-engine has been patched from pdflatex to lualatex in
    # _extensions/quarto-journals/plos/_extension.yml so the UTF-8 status
    # emojis in section 03's models table compile.
    journal:
      id: plosone
    number-sections: true
  docx:
    toc: false
    number-sections: true

execute:
  echo: false
  warning: false
