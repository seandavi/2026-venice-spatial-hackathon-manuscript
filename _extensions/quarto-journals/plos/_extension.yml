title: PLOS
author: Christophe Dervieux
version: 0.0.3
quarto-required: ">=1.2.198"
contributes:
  formats:
    common:
      # define below YAML configuration common to all formats
      execute:
        echo: false
      crossref:
        fig-prefix: Fig
        eq-prefix: Eq
      callout-appearance: simple
      callout-icon: false
      # https://www.zotero.org/styles/?q=plos
      csl: https://www.zotero.org/styles/plos-one
      filters:
        - filter.lua
    pdf:
      keep-tex: true
      block-headings: false
      documentclass: article
      papersize: letter
      fontsize: 10pt
      has-frontmatter: false
      toc: false
      lof: false
      lot: false
      # PLOS originally sets colorlinks=false (their journals print B&W).
      # For an online preprint, blue URLs and citations are clearer;
      # internal cross-refs stay black so the body text doesn't look busy.
      colorlinks: true
      urlcolor: blue
      citecolor: blue
      linkcolor: black
      # Replace the PLOS reviewer-margin default (left=2.75in to leave room
      # for line numbers and marginal notes) with conventional 1in margins
      # all around. Wide tables benefit from the extra horizontal room.
      # The \fancyheadoffset/\fancyfootoffset patches in _preamble.tex
      # align the running header/footer with this text block.
      geometry:
        - margin=1in
        - footskip=0.5in
      biblio-style: plos2015
      include-in-header: _preamble.tex
      template-partials:
        # Add here the partials your format is using
        - "partials/doc-class.tex"
        - "partials/before-body.tex"
        - "partials/_authors.tex"
        - "partials/_affiliations.tex"
        - "partials/title.tex"
        - "partials/before-bib.tex"
        - "partials/biblio.tex"
      # Switched from pdflatex to lualatex so UTF-8 emojis in
      # the section 03 models table compile. lualatex keeps the
      # PLOS preamble's microtype \DisableLigatures working
      # (unlike xelatex).
      pdf-engine: lualatex
      # biblatex is not supported
      cite-method: natbib
      # number is required for plos2015.bst style
      # and square,comma for correct guideline style
      # https://tex.stackexchange.com/questions/376662/how-do-i-create-plosone-bib-references
      natbiboptions: "numbers,square,comma"
      # tcolorbox is not working ok with breakable for code blocks so deactivate this Quarto feature
      # https://github.com/quarto-journals/article-format-template/issues/2
      code-block-border-left: false
      format-resources:
        - plos2015.bst
    html:
      # define default configuration for the html version of your format
      number-sections: true
      toc: true
      theme: custom.scss
